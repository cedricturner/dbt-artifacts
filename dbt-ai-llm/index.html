<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dbt + AI</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0e1117;--surface:#161b22;--raised:#1c2129;--border:#2d333b;
  --text:#e6edf3;--muted:#8b949e;
  --purple:#7c3aed;--pl:#a78bfa;--pdim:rgba(124,58,237,.12);
  --green:#3fb950;--blue:#58a6ff;--amber:#d29922;--red:#f85149;--orange:#ff6b35;
  --mono:'JetBrains Mono',monospace;--sans:'DM Sans',sans-serif;
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:1000px;margin:0 auto;padding:24px 20px 80px}
.hdr{text-align:center;margin-bottom:24px}
.hdr-tag{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--pl);background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.2);padding:4px 13px;border-radius:99px;margin-bottom:10px}
.hdr h1{font-size:clamp(20px,3.5vw,30px);font-weight:600;color:#fff;margin-bottom:5px}
.hdr p{color:var(--muted);font-size:13px}
.nav{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:5px;gap:3px;margin-bottom:20px;flex-wrap:wrap}
.ns{flex:1;min-width:60px;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px;border-radius:8px;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .2s;font-family:var(--sans)}
.ns:hover{background:var(--raised);color:var(--text)}
.ns.on{background:var(--purple);color:#fff}
.ns-n{font-family:var(--mono);font-size:9px;opacity:.6}
.ns-l{font-size:11px;font-weight:500;text-align:center;line-height:1.2}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px}
.card-title{font-size:15px;font-weight:600;color:#fff;margin-bottom:4px}
.card-sub{font-size:12px;color:var(--muted);margin-bottom:18px}
.ctrls{display:flex;justify-content:space-between;align-items:center;margin-top:18px}
.nbtn{padding:9px 20px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s}
.nbtn:hover:not(:disabled){border-color:var(--purple);color:var(--pl)}
.nbtn:disabled{opacity:.3;cursor:default}
.nbtn.pri{background:var(--purple);border-color:var(--purple);color:#fff}
.nbtn.pri:hover:not(:disabled){background:#6d28d9}
.prog{font-family:var(--mono);font-size:11px;color:var(--muted)}
.cap{font-size:12px;color:var(--muted);line-height:1.6;margin-top:14px;padding:10px 12px;background:var(--raised);border-radius:8px;border:1px solid var(--border)}

.lang-toggle{display:inline-flex;background:#161b22;border:1px solid #2d333b;border-radius:99px;padding:3px;gap:2px;flex-shrink:0}
.lang-btn{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;color:#8b949e;background:transparent;border:none;border-radius:99px;padding:5px 12px;cursor:pointer;transition:all .2s;line-height:1}
.lang-btn:hover{color:#e6edf3}
.lang-btn.active{background:var(--purple);color:#fff}
</style>
</head>
<body>
<div class="app">
<div style="margin-bottom:24px;display:flex;justify-content:space-between;align-items:center;gap:12px">
  <a href="../" data-i18n-html="back_all" style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#444c56;text-decoration:none" onmouseover="this.style.color='#8b949e'" onmouseout="this.style.color='#444c56'">← all explainers</a>
  <div class="lang-toggle" role="group" aria-label="Language / 言語">
    <button type="button" class="lang-btn active" data-lang="en" onclick="setLang('en')">EN</button>
    <button type="button" class="lang-btn" data-lang="ja" onclick="setLang('ja')">日本語</button>
  </div>
</div>
<div class="hdr">
  <div class="hdr-tag">dbt Labs · AI / LLM</div>
  <h1 data-i18n-html="h1">From Data to Conversation</h1>
  <p data-i18n-html="intro">How dbt connects your warehouse to AI agents, with the same trust layer that powers your BI tools.</p>
</div>
<div class="nav" id="snav"></div>
<div id="scontent"></div>
<div class="ctrls">
  <button class="nbtn" id="pb" onclick="nav(-1)" data-i18n-html="nav_back">← Back</button>
  <span class="prog" id="pg"></span>
  <button class="nbtn pri" id="nb" onclick="nav(1)">Next →</button>
</div>
<div style="text-align:center;margin-top:32px;padding-top:20px;border-top:1px solid #21262d"><a href="https://github.com/cedricturner/dbt-artifacts" target="_blank" rel="noopener noreferrer" style="display:inline-flex;align-items:center;gap:7px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#444c56;text-decoration:none" onmouseover="this.style.color='#8b949e'" onmouseout="this.style.color='#444c56'"><svg height="13" viewBox="0 0 16 16" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg><span data-i18n-html="gh_src">view source on github</span></a></div>
</div>

<script>
var cur = 0;

/* ─── STEP RENDERERS ─────────────────────────────────────── */

function renderStep0() {
  return `<div class="card">
  <div class="card-title">${T('t0_title','Dashboard vs. Conversation')}</div>
  <div class="card-sub">${T('t0_sub','Same data, same metrics. Different interface.')}</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">

    <!-- BI side -->
    <div style="background:var(--raised);border:1px solid var(--border);border-radius:10px;overflow:hidden">
      <div style="padding:9px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px">
        <span style="width:8px;height:8px;border-radius:50%;background:var(--blue);display:inline-block;flex-shrink:0"></span>
        <span style="font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px">${T('t0_bilabel','BI DASHBOARD')}</span>
      </div>
      <div style="padding:14px;display:flex;flex-direction:column;gap:10px">
        <!-- KPI row -->
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
          <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px">
            <div style="font-size:20px;font-weight:600;font-family:var(--mono);color:var(--blue)">$12M</div>
            <div style="font-size:10px;color:var(--muted);margin-top:2px">${T('t0_kpi1','Revenue')}</div>
            <div style="font-size:10px;color:var(--green);margin-top:3px">↑ 11.8% YoY</div>
          </div>
          <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px">
            <div style="font-size:20px;font-weight:600;font-family:var(--mono);color:var(--green)">42K</div>
            <div style="font-size:10px;color:var(--muted);margin-top:2px">${T('t0_kpi2','Active Users')}</div>
            <div style="font-size:10px;color:var(--green);margin-top:3px">↑ 6.2%</div>
          </div>
          <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px">
            <div style="font-size:20px;font-weight:600;font-family:var(--mono);color:var(--red)">3.1%</div>
            <div style="font-size:10px;color:var(--muted);margin-top:2px">${T('t0_kpi3','Churn Rate')}</div>
            <div style="font-size:10px;color:var(--red);margin-top:3px">↑ 0.3pp</div>
          </div>
        </div>
        <!-- Bar chart -->
        <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px">
          <div style="font-family:var(--mono);font-size:9px;color:var(--muted);margin-bottom:12px;letter-spacing:1px">${T('t0_barcap','REVENUE BY REGION · Q4')}</div>
          <div style="display:flex;align-items:flex-end;gap:10px;height:80px;padding:0 4px">
            <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%">
              <div style="flex:1;display:flex;align-items:flex-end;width:100%">
                <div style="width:100%;height:76%;background:linear-gradient(180deg,rgba(88,166,255,.8),rgba(88,166,255,.4));border-radius:3px 3px 0 0"></div>
              </div>
              <div style="font-size:9px;color:var(--muted)">${T('t0_region_n','North')}</div>
              <div style="font-family:var(--mono);font-size:9px;color:var(--blue)">$4.2M</div>
            </div>
            <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%">
              <div style="flex:1;display:flex;align-items:flex-end;width:100%">
                <div style="width:100%;height:55%;background:linear-gradient(180deg,rgba(88,166,255,.7),rgba(88,166,255,.3));border-radius:3px 3px 0 0"></div>
              </div>
              <div style="font-size:9px;color:var(--muted)">${T('t0_region_w','West')}</div>
              <div style="font-family:var(--mono);font-size:9px;color:var(--blue)">$3.1M</div>
            </div>
            <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%">
              <div style="flex:1;display:flex;align-items:flex-end;width:100%">
                <div style="width:100%;height:45%;background:linear-gradient(180deg,rgba(88,166,255,.6),rgba(88,166,255,.25));border-radius:3px 3px 0 0"></div>
              </div>
              <div style="font-size:9px;color:var(--muted)">${T('t0_region_s','South')}</div>
              <div style="font-family:var(--mono);font-size:9px;color:var(--blue)">$2.8M</div>
            </div>
            <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%">
              <div style="flex:1;display:flex;align-items:flex-end;width:100%">
                <div style="width:100%;height:30%;background:linear-gradient(180deg,rgba(88,166,255,.5),rgba(88,166,255,.2));border-radius:3px 3px 0 0"></div>
              </div>
              <div style="font-size:9px;color:var(--muted)">${T('t0_region_e','East')}</div>
              <div style="font-family:var(--mono);font-size:9px;color:var(--blue)">$1.9M</div>
            </div>
          </div>
        </div>
        <!-- Second chart: trend line mock -->
        <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px">
          <div style="font-family:var(--mono);font-size:9px;color:var(--muted);margin-bottom:10px;letter-spacing:1px">${T('t0_trendcap','REVENUE TREND · 6 MONTHS')}</div>
          <svg viewBox="0 0 260 60" style="width:100%;display:block">
            <polyline points="0,50 52,42 104,35 156,28 208,20 260,15" fill="none" stroke="rgba(88,166,255,.6)" stroke-width="2"/>
            <polyline points="0,50 52,42 104,35 156,28 208,20 260,15" fill="url(#tg)" stroke="none"/>
            <defs><linearGradient id="tg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(88,166,255,.2)"/><stop offset="100%" stop-color="rgba(88,166,255,0)"/></linearGradient></defs>
            <path d="M0,50 52,42 104,35 156,28 208,20 260,15 V60 H0Z" fill="url(#tg)"/>
            ${['Jul','Aug','Sep','Oct','Nov','Dec'].map((m,i)=>`<text x="${i*52}" y="58" fill="#8b949e" font-family="JetBrains Mono,monospace" font-size="7" text-anchor="middle">${m}</text>`).join('')}
          </svg>
        </div>
        <div style="font-size:10px;color:var(--muted);text-align:center;padding:6px;background:var(--bg);border:1px dashed var(--border);border-radius:6px">${T('t0_bicaption','Pre-built views · fixed filters · need analyst to go deeper')}</div>
      </div>
    </div>

    <!-- AI side -->
    <div style="background:var(--raised);border:1px solid var(--border);border-radius:10px;overflow:hidden;display:flex;flex-direction:column">
      <div style="padding:9px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px">
        <span style="width:8px;height:8px;border-radius:50%;background:var(--purple);display:inline-block;flex-shrink:0"></span>
        <span style="font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px">${T('t0_ailabel','AI AGENT')}</span>
      </div>
      <div style="padding:14px;flex:1;display:flex;flex-direction:column;gap:8px;overflow-y:auto">
        <div style="align-self:flex-end;max-width:88%;padding:9px 12px;border-radius:10px;font-size:12px;line-height:1.5;background:rgba(124,58,237,.18);border:1px solid rgba(124,58,237,.3);color:#c4b5fd">${T('t0_q1',"What drove East region's growth last quarter?")}</div>
        <div style="align-self:flex-start;max-width:92%;padding:9px 12px;border-radius:10px;font-size:12px;line-height:1.5;background:var(--bg);border:1px solid var(--border)">
          <span style="display:block;font-family:var(--mono);font-size:10px;color:var(--pl);background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.2);border-radius:4px;padding:3px 7px;margin-bottom:5px">→ query_metrics(revenue, group_by=[region, channel])</span>
          <span style="display:block;font-family:var(--mono);font-size:10px;color:var(--green);background:rgba(63,185,80,.06);border:1px solid rgba(63,185,80,.15);border-radius:4px;padding:3px 7px;margin-bottom:6px">← East: $1.9M · Digital channel +34%</span>
          ${T('t0_a1','East growth was almost entirely digital, up 34% QoQ. New customer acquisition, not expansion.')}
        </div>
        <div style="align-self:flex-end;max-width:88%;padding:9px 12px;border-radius:10px;font-size:12px;line-height:1.5;background:rgba(124,58,237,.18);border:1px solid rgba(124,58,237,.3);color:#c4b5fd">${T('t0_q2','Is CAC holding up or are we buying that growth?')}</div>
        <div style="align-self:flex-start;max-width:92%;padding:9px 12px;border-radius:10px;font-size:12px;line-height:1.5;background:var(--bg);border:1px solid var(--border)">
          <span style="display:block;font-family:var(--mono);font-size:10px;color:var(--pl);background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.2);border-radius:4px;padding:3px 7px;margin-bottom:5px">→ query_metrics(cac, region=East, group_by=[month])</span>
          <span style="display:block;font-family:var(--mono);font-size:10px;color:var(--green);background:rgba(63,185,80,.06);border:1px solid rgba(63,185,80,.15);border-radius:4px;padding:3px 7px;margin-bottom:6px">← CAC up 18% · payback period now 14mo</span>
          ${T('t0_a2','CAC climbed 18% while revenue grew 34%. Efficient for now, but payback is stretching. Worth watching in Q1.')}
        </div>
      </div>
      <div style="font-size:10px;color:var(--green);text-align:center;padding:7px;border-top:1px solid var(--border);background:rgba(63,185,80,.04)">${T('t0_aicaption','Governed metrics · follows the thread · no ticket required')}</div>
    </div>
  </div>
  <div class="cap">${T('t0_cap',"The dashboard answers the question you thought to ask. The agent follows the one you're actually asking, and keeps going. Same underlying dbt metrics, same definitions. The interface is what changes.")}</div>
</div>`;
}

function renderStep1() {
  return `<div class="card">
  <div class="card-title">${T('t1_title','The Stack: source to AI')}</div>
  <div class="card-sub">${T('t1_sub',"dbt sits at the center: it transforms raw data, defines business metrics in the Semantic Layer, and exposes everything via APIs. The MCP Server bridges dbt's APIs to LLMs, giving AI tools governed, structured access to the same data your dashboards use.")}</div>
  <div style="background:var(--raised);border:1px solid var(--border);border-radius:10px;padding:16px;overflow-x:auto">
    <img src="stack-diagram.svg" alt="${T('t1_alt','The Stack: source to AI architecture diagram')}" style="width:100%;display:block;border-radius:6px;background:#fff"/>
  </div>
  <div class="cap">${T('t1_cap',"The Semantic Layer and dbt APIs live inside the dbt Platform, defined once, reused by everyone. The MCP Server is the bridge: it wraps those APIs into structured tools that LLMs can reason with. Whether you're in Tableau or talking to Claude, you're getting the same governed data.")}</div>
</div>`;
}

function renderStep2() {
  return `<div class="card">
  <div class="card-title">${T('t2_title','How the Semantic Layer is built')}</div>
  <div class="card-sub">${T('t2_sub','Mart model → Semantic model (entities + dimensions) → Metrics')}</div>
  <div style="overflow-x:auto">
    <svg viewBox="0 0 800 330" xmlns="http://www.w3.org/2000/svg" style="width:100%;min-width:580px;display:block">
      <defs>
        <marker id="sa" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="6" markerHeight="5" orient="auto"><path d="M0 0 L10 3.5 L0 7z" fill="#444c56"/></marker>
        <marker id="sp" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="6" markerHeight="5" orient="auto"><path d="M0 0 L10 3.5 L0 7z" fill="#7c3aed"/></marker>
      </defs>

      <!-- MART MODEL -->
      <rect x="12" y="40" width="160" height="198" rx="8" fill="rgba(63,185,80,.07)" stroke="#3fb950" stroke-width="1.5"/>
      <text x="92" y="60" fill="#3fb950" font-family="JetBrains Mono,monospace" font-size="10" font-weight="600" text-anchor="middle">fct_orders</text>
      <text x="92" y="73" fill="#8b949e" font-family="JetBrains Mono,monospace" font-size="8" text-anchor="middle">${T('t2_martmodel','mart model')}</text>
      <line x1="20" y1="80" x2="164" y2="80" stroke="#2d333b" stroke-width="1"/>
      <!-- columns -->

      <text x="163" y="97" fill="#8b949e" font-family="JetBrains Mono,monospace" font-size="7.5" text-anchor="end">PK</text>
      <text x="24" y="115" fill="#e6edf3" font-family="JetBrains Mono,monospace" font-size="8.5">customer_id</text>
      <text x="163" y="115" fill="#8b949e" font-family="JetBrains Mono,monospace" font-size="7.5" text-anchor="end">FK</text>
      <text x="24" y="133" fill="#e6edf3" font-family="JetBrains Mono,monospace" font-size="8.5">order_total</text>
      <text x="163" y="133" fill="#8b949e" font-family="JetBrains Mono,monospace" font-size="7.5" text-anchor="end">decimal</text>
      <text x="24" y="151" fill="#e6edf3" font-family="JetBrains Mono,monospace" font-size="8.5">region</text>
      <text x="163" y="151" fill="#8b949e" font-family="JetBrains Mono,monospace" font-size="7.5" text-anchor="end">varchar</text>
      <text x="24" y="169" fill="#e6edf3" font-family="JetBrains Mono,monospace" font-size="8.5">channel</text>
      <text x="163" y="169" fill="#8b949e" font-family="JetBrains Mono,monospace" font-size="7.5" text-anchor="end">varchar</text>
      <text x="24" y="187" fill="#e6edf3" font-family="JetBrains Mono,monospace" font-size="8.5">ordered_at</text>
      <text x="163" y="187" fill="#8b949e" font-family="JetBrains Mono,monospace" font-size="7.5" text-anchor="end">timestamp</text>
      <text x="24" y="205" fill="#e6edf3" font-family="JetBrains Mono,monospace" font-size="8.5">status</text>
      <text x="163" y="205" fill="#8b949e" font-family="JetBrains Mono,monospace" font-size="7.5" text-anchor="end">varchar</text>
      <text x="24" y="225" fill="#e6edf3" font-family="JetBrains Mono,monospace" font-size="8.5" opacity=".4">...</text>

      <!-- mart → sem model -->
      <path d="M172 139 L226 139" stroke="#7c3aed" stroke-width="2" fill="none" marker-end="url(#sp)"/>
      <text x="199" y="131" fill="#a78bfa" font-family="JetBrains Mono,monospace" font-size="7.5" text-anchor="middle">${T('t2_builton','built on')}</text>

      <!-- SEMANTIC MODEL -->
      <rect x="226" y="30" width="184" height="248" rx="8" fill="rgba(124,58,237,.08)" stroke="#7c3aed" stroke-width="2"/>
      <text x="318" y="50" fill="#a78bfa" font-family="JetBrains Mono,monospace" font-size="10" font-weight="600" text-anchor="middle">sem_orders</text>
      <text x="318" y="63" fill="#8b949e" font-family="JetBrains Mono,monospace" font-size="8" text-anchor="middle">${T('t2_semmodel','semantic model')}</text>
      <line x1="234" y1="70" x2="402" y2="70" stroke="#3d2d6b" stroke-width="1"/>

window.setTier = function(i) {
  var tiers = window._tiers;
  if (!tiers) return;
  for (var j = 0; j < tiers.length; j++) {
    var pill = document.getElementById('tierpill' + j);
    if (pill) {
      var t = tiers[j];
      pill.style.background  = j === i ? t.bg     : 'var(--raised)';
      pill.style.borderColor = j === i ? t.border : 'var(--border)';
      pill.querySelector('span').style.color = j === i ? t.color : 'var(--muted)';
    }
  }
  var hdr  = document.getElementById('tier-hdr');
  var body = document.getElementById('tier-body');
  if (hdr)  hdr.textContent = T('t3_tierword','TIER') + ' ' + tiers[i].num + ': ' + tiers[i].label.split(':')[1].trim().toUpperCase();
  if (body) body.innerHTML  = window._buildTierDetail(i);
};

    html += '<div style="font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:1px;margin-bottom:6px">' + T('t4_lbl_tools','AVAILABLE TOOLS') + '</div>';

    }
    html += '</div></div>';

    // use cases
    html += '<div style="font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:1px;margin-bottom:8px">' + T('t4_lbl_usecases','USE CASES') + '</div>';
    html += '<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:12px">';
    for (var u = 0; u < c.usecases.length; u++) {
      var uc = c.usecases[u];
      html += '<div style="padding:8px 10px;background:var(--bg);border:1px solid var(--border);border-left:2px solid ' + c.color + ';border-radius:6px">';

      html += '<div style="font-size:11px;color:var(--muted);line-height:1.5">' + uc.detail + '</div>';
      html += '</div>';
    }
    html += '</div>';

    // example trace
    html += '<div style="font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:1px;margin-bottom:6px">' + T('t4_lbl_trace','EXAMPLE TRACE') + '</div>';
    html += '<div style="background:var(--bg);border:1px solid var(--border);border-radius:8px">';
    html += '<div style="padding:10px 12px;display:flex;flex-direction:column;gap:5px">';
    for (var k = 0; k < c.steps.length; k++) {

      if      (s.type === 'tool')   { sbg = 'rgba(124,58,237,.08)'; scolor = 'var(--pl)';    prefix = '→ '; }

      else if (s.type === 'ok')     { sbg = 'rgba(63,185,80,.06)';  scolor = 'var(--green)'; prefix = '✓ '; }
      else if (s.type === 'warn')   { sbg = 'rgba(210,153,34,.07)'; scolor = 'var(--amber)'; prefix = '⚠ '; }

      html += '<div style="font-family:var(--mono);font-size:10px;color:' + scolor + ';background:' + sbg + ';border-radius:4px;padding:4px 8px;white-space:pre-wrap;line-height:1.5">' + prefix + s.text + '</div>';
    }
    html += '</div></div>';

    return html;
  }

  window._buildUCDetail = buildUCDetail;

  var pillsHtml = '<div style="display:flex;flex-direction:column;gap:6px" id="ucpills">';
  for (var i = 0; i < cases.length; i++) {
    var active = i === 0;
    var c = cases[i];
    pillsHtml += '<div onclick="setUC(' + i + ')" id="ucpill' + i + '" style="padding:10px 14px;background:' + (active ? c.bg : 'var(--raised)') + ';border:1px solid ' + (active ? c.border : 'var(--border)') + ';border-radius:9px;cursor:pointer;transition:all .2s">';

    pillsHtml += '<div style="font-size:11px;color:var(--muted);margin-top:2px">' + c.sub + '</div>';
    pillsHtml += '</div>';

  pillsHtml += '</div>';

  var visHtml = '<div style="background:var(--raised);border:1px solid var(--border);border-radius:10px;overflow:hidden;display:flex;flex-direction:column">' +
    '<div style="padding:14px;flex:1;overflow-y:auto" id="uc-body">' + buildUCDetail(0) + '</div>' +
    '</div>';

  return '<div class="card"><div class="card-title">' + T('t4_title','Use Cases by Tool Group') + '</div><div class="card-sub">' + T('t4_sub','Each tool group unlocks different agent capabilities. Click a group to see what it enables and how it works in practice.') + '</div>' +
    '<div style="display:grid;grid-template-columns:200px 1fr;gap:14px;align-items:start">' +
    pillsHtml + visHtml +
    '</div></div>';
}

window.setUC = function(i) {
  var cases = window._ucCases;
  if (!cases) return;
  for (var j = 0; j < cases.length; j++) {
    var pill = document.getElementById('ucpill' + j);
    if (pill) {
      pill.style.background  = j === i ? cases[j].bg    : 'var(--raised)';
      pill.style.borderColor = j === i ? cases[j].border : 'var(--border)';
      var titleEl = pill.querySelector('div');
      if (titleEl) titleEl.style.color = j === i ? cases[j].color : 'var(--text)';
    }
  }
  var body = document.getElementById('uc-body');
  if (body) body.innerHTML = window._buildUCDetail(i);
};

    html += '<div style="font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:7px">' + T('t5_lbl_caps','CAPABILITIES') + '</div>';
    html += '<div style="display:flex;flex-direction:column;gap:5px;margin-bottom:14px">';
    for (var ci = 0; ci < c.caps.length; ci++) {
      var cap = c.caps[ci];
      var icon, iconColor;
      if (cap.have === true)        { icon = '✓'; iconColor = 'var(--green)'; }
      else if (cap.have === 'partial') { icon = '~'; iconColor = 'var(--amber)'; }
      else                           { icon = '✗'; iconColor = 'var(--red)'; }
      html += '<div style="display:flex;align-items:flex-start;gap:8px;padding:7px 10px;background:var(--raised);border:1px solid var(--border);border-radius:6px">';
      html += '<span style="font-family:var(--mono);font-size:11px;font-weight:600;color:' + iconColor + ';flex-shrink:0;width:14px">' + icon + '</span>';
      html += '<div style="flex:1"><div style="font-size:11px;font-weight:500;color:var(--text)">' + cap.label + '</div>';
      html += '<div style="font-size:10px;color:var(--muted);margin-top:1px">' + cap.note + '</div></div>';
      html += '</div>';
    }
    html += '</div>';

    // scenario
    html += '<div style="font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:7px">' + T('t5_lbl_example','EXAMPLE INTERACTION') + '</div>';
    html += '<div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;overflow:hidden">';
    html += '<div style="padding:8px 12px;background:rgba(124,58,237,.08);border-bottom:1px solid rgba(124,58,237,.2)">';
    html += '<div style="font-size:11px;color:#c4b5fd">' + c.scenario.q + '</div></div>';
    html += '<div style="padding:10px 12px;display:flex;flex-direction:column;gap:5px">';
    for (var si = 0; si < c.scenario.steps.length; si++) {
      var step = c.scenario.steps[si];
      var bg, color, prefix;
      if      (step.type === 'tool')   { bg = 'rgba(124,58,237,.08)'; color = 'var(--pl)';    prefix = '→ '; }
      else if (step.type === 'result') { bg = 'rgba(63,185,80,.06)';  color = 'var(--green)'; prefix = '← '; }
      else if (step.type === 'ok')     { bg = 'rgba(63,185,80,.06)';  color = 'var(--green)'; prefix = '✓ '; }
      else if (step.type === 'warn')   { bg = 'rgba(210,153,34,.07)'; color = 'var(--amber)'; prefix = '⚠ '; }
      else if (step.type === 'think')  { bg = 'rgba(255,255,255,.03)';color = 'var(--muted)'; prefix = '… '; }
      else                             { bg = 'rgba(88,166,255,.06)';  color = 'var(--blue)';  prefix = '';   }
      html += '<div style="font-family:var(--mono);font-size:10px;color:' + color + ';background:' + bg + ';border-radius:4px;padding:4px 8px;white-space:pre-wrap;line-height:1.5">' + prefix + step.text + '</div>';
    }
    html += '</div></div>';
    return html;
  }

  window._buildConfig = buildConfig;

  // left pills
  var pillsHtml = '<div style="display:flex;flex-direction:column;gap:6px" id="cfgpills">';
  for (var i = 0; i < configs.length; i++) {
    var c = configs[i];
    var active = i === 0;
    pillsHtml += '<div onclick="setCfg(' + i + ')" id="cfgpill' + i + '" style="padding:11px 14px;background:' + (active ? c.bg : 'var(--raised)') + ';border:1px solid ' + (active ? c.border : 'var(--border)') + ';border-radius:9px;cursor:pointer;transition:all .2s">';
    pillsHtml += '<div style="display:flex;align-items:center;gap:8px">';
    pillsHtml += '<span style="font-family:var(--mono);font-size:11px;font-weight:600;color:' + (active ? c.color : 'var(--muted)') + '">' + c.num + '</span>';
    pillsHtml += '<div><div style="font-size:12px;font-weight:600;color:var(--text)">' + c.title + '</div>';
    pillsHtml += '<div style="font-size:10px;color:var(--muted);margin-top:1px">' + c.sub + '</div></div>';
    pillsHtml += '</div></div>';
  }
  pillsHtml += '</div>';

  var visHtml = '<div style="background:var(--raised);border:1px solid var(--border);border-radius:10px;overflow:hidden;display:flex;flex-direction:column">';
  visHtml += '<div style="padding:9px 13px;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px" id="cfg-hdr">' + configs[0].title.toUpperCase() + '</div>';
  visHtml += '<div style="padding:16px;flex:1;overflow-y:auto;max-height:600px" id="cfg-body">' + buildConfig(0) + '</div>';
  visHtml += '</div>';

  return '<div class="card"><div class="card-title">' + T('t5_title','Cursor / Claude: 4 configurations') + '</div>' +
    '<div class="card-sub">' + T('t5_sub','Each layer of dbt adds something the AI agent couldn\'t do before. Click to compare.') + '</div>' +
    '<div style="display:grid;grid-template-columns:1fr 1.6fr;gap:14px">' +
    pillsHtml + visHtml +
    '</div>' +
    '<div class="cap">' + T('t5_cap','Configuration 4 is the full picture, but configurations 2 and 3 are already meaningful standalone improvements. The question isn\'t "do you need all of it" but rather "how much of your data workflow do you want the AI to understand?"') + '</div>' +
    '</div>';
}

window.setCfg = function(i) {
  var configs = window._cfgCases;
  if (!configs) return;
  for (var j = 0; j < configs.length; j++) {
    var pill = document.getElementById('cfgpill' + j);
    if (pill) {
      var c = configs[j];
      pill.style.background   = j === i ? c.bg     : 'var(--raised)';
      pill.style.borderColor  = j === i ? c.border : 'var(--border)';
      pill.querySelector('span').style.color = j === i ? c.color : 'var(--muted)';
    }
  }
  var hdr  = document.getElementById('cfg-hdr');
  var body = document.getElementById('cfg-body');
  if (hdr)  hdr.textContent  = configs[i].title.toUpperCase();
  if (body) body.innerHTML   = window._buildConfig(i);
};

/* ─── NAV ─────────────────────────────────────────────── */
function renderNav() {
  var html = '';
  for (var i = 0; i < STEPS.length; i++) {
    html += '<button class="ns ' + (i===cur?'on':'') + '" onclick="goTo(' + i + ')">';
    html += '<span class="ns-n">' + String(i+1).padStart(2,'0') + '</span>';
    html += '<span class="ns-l">' + T('nav_lbl_'+i, STEPS[i].lbl) + '</span>';
    html += '</button>';
  }
  document.getElementById('snav').innerHTML = html;
}

function renderContent() {
  document.getElementById('scontent').innerHTML = STEPS[cur].render();
  document.getElementById('pg').textContent = (cur+1) + ' / ' + STEPS.length;
  document.getElementById('pb').disabled = cur === 0;
  var nb = document.getElementById('nb');
  nb.disabled = cur === STEPS.length - 1;
  nb.textContent = cur === STEPS.length - 1 ? T('nav_done','Done') : T('nav_next','Next →');
}

function goTo(i) { cur = i; renderNav(); renderContent(); window.scrollTo({top:0,behavior:'smooth'}); }
function nav(d) { if (cur+d >= 0 && cur+d < STEPS.length) goTo(cur+d); }

var translations={"ja": {"t0_title": "ダッシュボード vs. 会話", "t0_sub": "同じデータ、同じメトリクス。違うのはインターフェースだけ。", "t0_bilabel": "BIダッシュボード", "t0_kpi1": "収益", "t0_kpi2": "アクティブユーザー", "t0_kpi3": "解約率", "t0_barcap": "地域別収益・Q4", "t0_region_n": "北", "t0_region_w": "西", "t0_region_s": "南", "t0_region_e": "東", "t0_trendcap": "収益トレンド・過去6か月", "t0_bicaption": "あらかじめ用意されたビュー・固定フィルター・深掘りにはアナリストが必要", "t0_ailabel": "AIエージェント", "t0_q1": "前四半期、東エリアの成長を牽引したのは何？", "t0_a1": "東エリアの成長はほぼすべてデジタル経由で、前四半期比34%増。既存顧客の拡大ではなく新規顧客の獲得によるものです。", "t0_q2": "CACは健全な水準？ それともお金で成長を買っているだけ？", "t0_a2": "CACは18%上昇した一方、収益は34%伸びました。今のところ効率的ですが、回収期間は伸びています。Q1は注視が必要です。", "t0_aicaption": "ガバナンスの効いたメトリクス・話の流れをそのまま追える・チケット申請不要", "t0_cap": "ダッシュボードは、あなたが思いついた質問に答えます。エージェントは、あなたが今まさに聞きたいことを追いかけ続けます。裏側にあるdbtのメトリクスと定義は同じで、変わるのはインターフェースだけです。", "t1_title": "スタック全体像：ソースからAIまで", "t1_sub": "dbt はその中心に位置し、生データを変換し、セマンティックレイヤーでビジネスメトリクスを定義し、すべてを API として公開します。MCP サーバーは dbt の API と LLM をつなぐ橋渡し役で、AI ツールにダッシュボードと同じガバナンスの効いた構造化データへのアクセスを与えます。", "t1_alt": "スタック全体像：ソースからAIまでのアーキテクチャ図", "t1_cap": "セマンティックレイヤーと dbt の API は dbt Platform の中にあり、一度定義すれば誰もが使い回せます。MCP サーバーはその橋渡し役で、これらの API を LLM が扱える構造化ツールとしてラップします。Tableau を使っていても Claude と話していても、得られるのは同じガバナンスの効いたデータです。", "t2_title": "セマンティックレイヤーはどう作られるか", "t2_sub": "マートモデル → セマンティックモデル（エンティティ＋ディメンション） → メトリクス", "t2_martmodel": "マートモデル", "t2_builton": "土台にする", "t2_semmodel": "セマンティックモデル", "t2_entities": "エンティティ", "t2_primary": "（主キー）", "t2_dimensions": "ディメンション", "t2_timedim": "（時間ディメンション）", "t2_measures": "メジャー", "t2_defines": "定義する", "t2_simple": "シンプル", "t2_measure": "メジャー", "t2_groupby": "グループ化", "t2_derived": "導出", "t2_expr": "式", "t2_inherits": "継承", "t2_inheritsval": "親メトリクスのすべてのディメンション", "t2_cap": "セマンティックモデルは<strong>エンティティ</strong>（グレイン）、<strong>ディメンション</strong>（切り口）、<strong>メジャー</strong>（生の集計）を登録します。メトリクスはその上に乗ります。シンプルなメトリクスは単一のメジャーを参照し、導出メトリクスはほかのメトリクスを組み合わせます。AI エージェントが <code style=\"color:var(--pl)\">query_metrics(\"revenue\")</code> を呼ぶと、MetricFlow が SQL を生成します。余計なものは何もマテリアライズされません。", "t3_1_label": "ティア1: セマンティックレイヤー", "t3_1_badge": "最も効率的", "t3_1_headline": "名前付きメトリクスを直接呼び出す", "t3_1_when": "エージェントは答えが定義済みのメトリクスだとわかっている。SQL は書かず、スキーマも推測しない。", "t3_1_q": "前四半期の地域別収益は？", "t3_1_s2": "メトリクス一覧に 'revenue' を発見", "t3_1_s5": "SQL は生成されない。完全にガバナンスが効いている。", "t3_2_label": "ティア2: ディスカバリー", "t3_2_badge": "まず探索する", "t3_2_headline": "行動する前にプロジェクトを理解する", "t3_2_when": "エージェントには文脈が必要：どんなモデルがあるか、リネージュはどうなっているか、どのテストが通っているか。トークンは増えるが誤答を防げる。", "t3_2_q": "解約率の様子がおかしい。調べてもらえる？", "t3_2_s2": "stg_subscriptions までたどり着く", "t3_2_s4": "最終実行: 31時間前", "t3_2_s5": "SQL を一切書かずに根本原因を突き止める。", "t3_3_label": "ティア3: 直接SQL", "t3_3_badge": "アドホック", "t3_3_headline": "該当するメトリクスがなければ直接 SQL を実行する", "t3_3_when": "その質問に対応する定義済みメトリクスがない。エージェントは既知のモデルに対して SQL を書く。トークンは増え、ガバナンスは弱まる。", "t3_3_q": "過去7日間でプランタイプ別に作成されたアカウント数は？", "t3_3_s1": "該当するメトリクスがない。fct_accounts に直接クエリする。", "t3_3_s4": "生の結果。テストもメトリクス定義の強制もない。", "t3_4_label": "ティア4: テキストからSQL", "t3_4_badge": "最後の手段", "t3_4_headline": "自然言語から SQL を生成する", "t3_4_when": "メトリクスも既知のモデルもない。エージェントは SQL をゼロから生成する。トークン消費が最も多く、間違いも起きやすく、ガバナンスもない。できる限り避けるべき。", "t3_4_q": "エンタープライズアカウントの国別平均注文額", "t3_4_s1": "この質問に対応するメトリクスも既知のモデルもない", "t3_4_s3": "スキーマだけをもとに SQL を生成", "t3_4_s4": "テストも定義もない。Tableau の結果と異なる可能性がある。", "t3_lbl_when": "使いどころ", "t3_lbl_tools": "ツール", "t3_lbl_example": "やり取りの例", "t3_spectrum": "効率のスペクトラム", "t3_spec_left": "トークン最小・ガバナンス最大", "t3_spec_right": "トークン最大・ガバナンス最小", "t3_title": "エージェントの推論", "t3_sub": "エージェントがどのツールを使うかをどう決めるか。最も効率的な手段から最後の手段まで。", "t3_tierword": "ティア", "t4_1_title": "セマンティックレイヤー", "t4_1_sub": "ガバナンスの効いたメトリクスクエリ。生の SQL は不要。", "t4_1_desc": "最も価値の高いツール群。エージェントは事前に定義・テスト済みのメトリクスを名前で問い合わせます。BI ダッシュボードを動かしているのと同じ定義です。SQL 生成も、列名の推測も必要ありません。", "t4_1_uc1_t": "自然言語での問い合わせ", "t4_1_uc1_d": "ステークホルダーが「先月の解約率は？」と聞けば、正確でガバナンスの効いた答えが返ってきます。アナリストも SQL も不要です。", "t4_1_uc2_t": "BIツールと一貫した答え", "t4_1_uc2_d": "Tableau、Sigma、Excel などの BI ツールも同じセマンティックレイヤーに問い合わせます。定義は1つ、どこでも同じ数字です。", "t4_1_uc3_t": "定期レポーティング", "t4_1_uc3_d": "エージェントがスケジュールに沿ってメトリクスを取得し、要約を書いて Slack やメールに自動かつ正確に投稿します。", "t4_1_uc4_t": "メトリクスの探索", "t4_1_uc4_d": "エージェントは回答する前に、どんなメトリクスが存在するか、どんなディメンションが使えるか、どんな保存済みクエリがすでに定義されているかを調べられます。", "t4_1_s1": "Q: 「今四半期のプランタイプ別解約率は？」", "t4_1_s6": "無料プランの解約率は3.4%に上昇。Pro と Enterprise は横ばいでした。", "t4_2_title": "Discovery API", "t4_2_sub": "行動する前にプロジェクトを理解する", "t4_2_desc": "Discovery ツールは、モデル・リネージュ・ヘルス・ドキュメントなど、プロジェクト全体の地図をエージェントに与えます。何かを変更したり問題をデバッグしたりする前に欠かせない文脈です。", "t4_2_uc1_t": "リネージュの探索", "t4_2_uc1_d": "あるメトリクスがどこから来ているのか、どのモデルがそれに流れ込んでいるのか、どの下流レポートがそれに依存しているのかをたどれます。データ品質のデバッグや影響範囲の分析に役立ちます。", "t4_2_uc2_t": "外部ツールへのリネージュ取り込み", "t4_2_uc2_d": "リネージュのメタデータをデータカタログ、オブザーバビリティ基盤、独自ダッシュボードなど他のツールに取り込み、プロジェクト全体を統一的に把握できます。", "t4_2_uc3_t": "壊れたメトリクスのデバッグ", "t4_2_uc3_d": "セマンティックレイヤーのクエリが想定外の結果を返したとき、Discovery ツールが上流をたどり、古いモデル・失敗したテスト・スキーマ変更を突き止めます。", "t4_2_uc4_t": "プロジェクトのオンボーディング", "t4_2_uc4_d": "新しいエンジニアやエージェントは、コードベースを開かなくても、どんなモデルがあるか、それらが何をしていて、どうつながっているかをプロジェクト全体から探索できます。", "t4_2_s1": "Q: 「収益が18%落ちた。何が起きた？」", "t4_2_s3": "fct_orders → stg_payments へとたどり着く", "t4_2_s5": "最終成功実行: 31時間前", "t4_2_s6": "stg_payments が古い。これはパイプラインの遅延であり、実際の収益減少ではない。", "t4_3_title": "Admin API", "t4_3_sub": "ジョブ・実行・パフォーマンスの監視", "t4_3_desc": "Admin ツールを使えば、エージェントはジョブのライフサイクル全体を管理できます。実行のトリガー、ステータスの監視、失敗の可視化、パフォーマンスのデバッグまで。誰も dbt Cloud にログインする必要はありません。", "t4_3_uc1_t": "ジョブ失敗のトリアージ", "t4_3_uc1_d": "ジョブが失敗すると、エージェントはすぐにエラーログを取得し、どのモデルが壊れたかを特定し、上流をたどって、オンコールのエンジニアに実行可能な文脈を提示できます。", "t4_3_uc2_t": "パフォーマンスのデバッグ", "t4_3_uc2_d": "エージェントはどのモデルが遅いか、実行時間がどう推移しているかを特定し、増分ロジックやパーティショニングをどこに追加すべきか提案できます。", "t4_3_uc3_t": "実行の自動管理", "t4_3_uc3_d": "上流のイベント（ソーステーブルの着地など）に応じてジョブをトリガーし、完了を監視し、失敗をリトライし、あるいはスタックした実行をキャンセルします。手作業は不要です。", "t4_3_uc4_t": "オブザーバビリティとアラート", "t4_3_uc4_d": "ジョブの健全性を積極的に監視し、障害になる前に実行時間の悪化を可視化し、その状態を運用ダッシュボードや Slack アラートに反映します。", "t4_3_s1": "アラート: revenue メトリクスが古い。調査中。", "t4_3_s3": "stg_payments のジョブが32時間前に失敗", "t4_3_s5": "ソーステーブルに列 \"amount_usd\" が見つからない", "t4_3_s6": "上流でスキーマが変更された。すべての文脈とともにエンジニアへ提示。", "t4_4_sub": "ライブセッションでビルド・テスト・クエリを行う", "t4_4_desc": "CLI ツールは、書くこととそれを検証することの間をつなぎます。エージェントはモデルをビルドし、テストを実行し、その場で出力にクエリをかけられます。すべて1つのセッションの中で。開発中のアクティブなワークフローに最適です。", "t4_4_uc1_t": "アクティブなモデル開発", "t4_4_uc1_d": "モデルを書き、compile で SQL を検証し、実行し、テストし、出力にクエリをかける。エージェントとの会話を一度も離れることなく。", "t4_4_uc2_t": "PR前の検証", "t4_4_uc2_d": "コードがマージされる前に、エージェントは影響を受けるモデルとそのテストを実行し、失敗を早期に検知して PR コメントとして結果を提示できます。", "t4_4_uc3_t": "アドホックなSQL探索", "t4_4_uc3_d": "execute_sql は、まだメトリクスが存在しないときにエージェントへ直接的なクエリ手段を与えます。単発の分析や探索的なデータ作業に便利です。", "t4_4_uc4_t": "text_to_sql（最後の手段）", "t4_4_uc4_d": "メトリクスもモデルも質問に一致しないとき、エージェントは生の SQL を生成できます。最も信頼性が低く、ガバナンスの効いたメトリクスとは結果が異なる場合があります。あくまでフォールバックとして使います。", "t4_4_s1": "「orders と customer segments を結合するモデルを作って」", "t4_4_s3": "SQL は正常。構文エラーなし。", "t4_4_s6": "すべてのテストが通過。モデルは準備完了。", "t4_5_title": "Codegen", "t4_5_sub": "スキーマから dbt の定型コードを生成する", "t4_5_desc": "Codegen ツールは、エージェントがデータベーススキーマを読み取り、ソース定義・ステージングモデル・YAML ドキュメントを生成できるようにします。何時間もかかるセットアップが数分で終わります。", "t4_5_uc1_t": "新しいソースのオンボーディング", "t4_5_uc1_d": "新しいデータソースがウェアハウスに到着すると、エージェントは sources.yml、ステージングモデル、列レベルの YAML ドキュメントを数分で生成します。何時間もかかりません。", "t4_5_uc2_t": "ドキュメントの生成", "t4_5_uc2_d": "エージェントは列名と型があらかじめ埋まったモデル YAML を生成でき、エンジニアは説明文を書くところから始められます。", "t4_5_uc3_t": "新しいプロジェクトのひな形作成", "t4_5_uc3_d": "一貫したステージングパターン、命名規則、ファイル構成を持つ新しい dbt プロジェクト領域を立ち上げます。古いモデルからのコピペは不要です。", "t4_5_s1": "新しいソースが到着: raw_stripe スキーマ", "t4_5_s3": "sources.yml を作成: 12テーブル", "t4_5_s5": "stg_stripe__charges.sql を作成", "t4_5_s7": "24列すべてを含む YAML。何時間ものセットアップが数分で完了。", "t4_6_sub": "列レベルのリネージュとIDEの文脈", "t4_6_desc": "Fusion ツールは列レベルのリネージュと IDE スタイルのインテリジェンスを提供します。開発者のワークフロー、特に「ある列がどこから来て、プロジェクト内をどう流れているか」を理解するのに最適です。", "t4_6_uc1_t": "列レベルのリネージュ", "t4_6_uc1_d": "ある列の値が、結合や CTE を経てモデルをまたいでどこから来ているのかを正確にたどり、データ変換を理解して想定外の値をデバッグします。", "t4_6_uc2_t": "データ品質のデバッグ", "t4_6_uc2_d": "ダッシュボードの数字がおかしく見えるとき、列レベルのリネージュを生データのソースまでさかのぼり、値がどこで誤って変換・フィルタされたかを見つけます。", "t4_6_uc3_t": "開発者向けインテリジェンス", "t4_6_uc3_d": "ref() と source() の補完機能は、エージェントがどのモデルとソースが存在するかを推測やハルシネーションなしに把握し、正確な dbt の SQL を書く助けになります。", "t4_6_s1": "「なぜ2つのモデルで revenue の値が違うの？」", "t4_6_s3": "たどると: stg_stripe.amount → intermediate.orders_with_fx → fct_revenue", "t4_6_s5": "たどると: stg_braintree.amount_usd → fct_orders", "t4_6_s6": "決済ソースが違う。同じメトリクスではない。アナリストへ提示。", "t4_lbl_tools": "利用可能なツール", "t4_lbl_usecases": "ユースケース", "t4_lbl_trace": "トレース例", "t4_title": "ツールグループ別ユースケース", "t4_sub": "ツールグループごとに、エージェントができることが変わります。グループをクリックすると、それが何を可能にし、実際にどう動くかがわかります。", "t5_1_sub": "dbt の文脈なし", "t5_stack_agent": "AIコーディングエージェント", "t5_1_stack2": "あなたのコードベース（ファイルのみ）", "t5_cap_sql": "SQLクエリを書く", "t5_1_c1": "ゼロから生の SQL を生成する", "t5_cap_schema": "スキーマを理解する", "t5_1_c2": "貼り付けた場合のみ", "t5_cap_metrics": "メトリクスの定義を知る", "t5_1_c3": "テーブル名・列名から推測するだけ", "t5_cap_validated": "検証・テスト済みの出力", "t5_1_c4": "テストも契約もない", "t5_cap_lineage": "リネージュの把握", "t5_1_c5": "DAGも上流の文脈もない", "t5_cap_consistent": "一貫した答え", "t5_1_c6": "「revenue」の意味はモデルの推測次第", "t5_1_q": "先月の地域別収益は？", "t5_1_s1": "orders や revenue っぽい名前のテーブルを探してみよう…", "t5_1_s3": "\"amount\" 列を推測 ・完了済み注文のフィルターなし・テストなし・間違っている可能性あり", "t5_2_sub": "セマンティックレイヤーに接続", "t5_2_stack3": "セマンティックレイヤー → MetricFlow", "t5_2_c1": "まだ書けるが、もう書く必要はない", "t5_2_c2": "get_model_details・get_all_models 経由", "t5_2_c3": "list_metrics ・get_dimensions", "t5_2_c4": "クエリは MetricFlow を経由する", "t5_2_c5": "get_lineage がツールとして使える", "t5_2_c6": "revenue は常に revenue", "t5_2_s5": "ガバナンスあり・テスト済み・一貫している。モデルが SQL を書くことはない。", "t5_3_sub": "IDEを理解し、プロジェクトの文脈をリアルタイムに把握", "t5_3_stack3": "Fusion エンジン（リアルタイムのプロジェクトグラフ）", "t5_3_c1": "プロジェクトの文脈をすべて把握したうえで", "t5_3_c2": "リアルタイム。コンパイル不要", "t5_3_c3": "MCP と拡張機能の文脈経由", "t5_3_c4": "MetricFlow と Fusion の検証経由", "t5_3_c5": "エディタ内のリアルタイムDAG + MCP", "t5_3_cap6": "オートコンプリートと ref() の連携", "t5_3_c6": "Fusion がグラフを常に最新に保ち、ref は即座に解決される", "t5_3_q": "orders と customer segments を結合する新しいモデルを作って", "t5_3_s1": "拡張機能はプロジェクト全体を把握。fct_orders と dim_customers はすでに文脈にある", "t5_3_s3": "ref() は自動補完・Fusion が上流の存在を検証・リネージュも自動更新", "t5_4_title": "＋すべてを組み合わせる", "t5_4_sub": "dbt のフルスタック、最も強力な構成", "t5_4_stack2": "dbt Extension + Fusion（リアルタイムの文脈 function T(key, en){
  if(curLang!=='en'){
    var dict=translations[curLang];
    if(dict && Object.prototype.hasOwnProperty.call(dict,key)) return dict[key];
  }
  return en;
}
function cacheEn(){
  document.querySelectorAll('[data-i18n]').forEach(function(el){el.dataset.en=el.textContent;});
  document.querySelectorAll('[data-i18n-html]').forEach(function(el){el.dataset.enHtml=el.innerHTML;});
}
function setLang(lang){
  curLang=lang;
  var dict=translations[lang]||{};
  document.querySelectorAll('[data-i18n]').forEach(function(el){
    var k=el.getAttribute('data-i18n');
    if(lang==='en'){if(el.dataset.en!==undefined)el.textContent=el.dataset.en;}
    else if(dict[k]!==undefined){el.textContent=dict[k];}
  });
  document.querySelectorAll('[data-i18n-html]').forEach(function(el){
    var k=el.getAttribute('data-i18n-html');
    if(lang==='en'){if(el.dataset.enHtml!==undefined)el.innerHTML=el.dataset.enHtml;}
    else if(dict[k]!==undefined){el.innerHTML=dict[k];}
  });
  document.documentElement.lang=lang;
  document.querySelectorAll('.lang-btn').forEach(function(b){b.classList.toggle('active',b.getAttribute('data-lang')===lang);});
  renderNav();
  renderContent();
  try{localStorage.setItem('lang',lang);}catch(e){}
}

renderNav();
renderContent();
cacheEn();
(function(){
  var saved=null;try{saved=localStorage.getItem('lang');}catch(e){}
  var initial=saved||(((navigator.language||navigator.userLanguage||'').toLowerCase().indexOf('ja')===0)?'ja':'en');
  setLang(initial);
})();
</script>
